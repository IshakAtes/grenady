name: Build and deploy Grenady container

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: grenady-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  CONTAINER_NAME: grenady-app
  DEPLOY_PATH: /opt/grenady
  APP_PORT: "3000"

jobs:
  pull-request:
    name: Pull request checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /

      - name: Build Docker image without push
        run: docker build --build-arg VITE_BASE_PATH=/ -t grenady-pr-check .

  deploy:
    name: Build, push and deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          IMAGE_NAME="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_BASE_PATH=/ \
            -t "${{ steps.meta.outputs.image }}:latest" \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha }}" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ steps.meta.outputs.image }}:latest"
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha }}"

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ${{ steps.meta.outputs.image }}
          IMAGE_TAG: ${{ steps.meta.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail

          : "${VPS_HOST:?VPS_HOST secret is required}"
          : "${VPS_USER:?VPS_USER secret is required}"
          : "${VPS_SSH_KEY:?VPS_SSH_KEY secret is required}"
          : "${VPS_PORT:?VPS_PORT secret is required}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/grenady_vps_key
          chmod 600 ~/.ssh/grenady_vps_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

          GHCR_PAT_B64="$(printf '%s' "${GHCR_PAT:-}" | base64 -w0)"

          ssh -i ~/.ssh/grenady_vps_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "IMAGE='$IMAGE' IMAGE_TAG='$IMAGE_TAG' CONTAINER_NAME='$CONTAINER_NAME' DEPLOY_PATH='$DEPLOY_PATH' APP_PORT='$APP_PORT' GHCR_USER='$GHCR_USER' GHCR_PAT_B64='$GHCR_PAT_B64' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker is not installed on the VPS." >&2
            exit 1
          fi

          if ! mkdir -p "$DEPLOY_PATH" 2>/dev/null; then
            sudo mkdir -p "$DEPLOY_PATH"
            sudo chown "$USER":"$USER" "$DEPLOY_PATH"
          fi

          if [ ! -f "$DEPLOY_PATH/.env" ]; then
            echo "Missing $DEPLOY_PATH/.env on VPS. Create it before deploying." >&2
            exit 1
          fi

          if [ -n "${GHCR_PAT_B64:-}" ]; then
            GHCR_PAT="$(printf '%s' "$GHCR_PAT_B64" | base64 -d)"
            printf '%s' "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          fi

          docker pull "${IMAGE}:${IMAGE_TAG}"
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true

          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            --env-file "$DEPLOY_PATH/.env" \
            -e NODE_ENV=production \
            -e PORT=3000 \
            -p "127.0.0.1:${APP_PORT}:3000" \
            "${IMAGE}:${IMAGE_TAG}"

          docker ps --filter "name=$CONTAINER_NAME"
          sleep 5
          curl -fsS "http://127.0.0.1:${APP_PORT}/healthz"
          REMOTE_SCRIPT
